<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eighth Lesson</title>
    <style>
        .field-row {
            display: block;
            margin-bottom: 5px;
        }

        .feedback-label {
            display: inline-block;
            width: 300px;
            vertical-align: middle;
            margin-right: 10px;
        }

        .feedback-btn {
            vertical-align: middle;
        }

        .search-wrapper {
            text-align: center;
            margin-top: 50px;
        }

        .brand-logo {
            width: 200px;
            display: block;
            margin: 0 auto 10px auto;
        }

        .query-input {
            width: 400px;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #dfe1e5;
            box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
            outline: none;
        }
    </style>
</head>
<body>

    <input type="text" class="field-row" placeholder="Name">
    <input type="text" class="field-row" placeholder="Email">

    <br><br>

    <p class="feedback-label">
        thanks for chatting with our customer support. would you like to take our quick survey?
    </p>
    <button class="feedback-btn">yes</button>
    <button class="feedback-btn">no</button>

    <br><br>

    <div class="search-wrapper">
        <img class="brand-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google Logo">
        <input type="text" class="query-input" placeholder="Search Google or type a URL">
    </div>

</body>

<hr>

<div class="register-form">
    <input type="text" class="name-first" placeholder="First name">
    <input type="text" class="name-last" placeholder="Last name">
    <input type="text" class="email-address" placeholder="Email">
    <button class="btn-register">Sign Up</button>
</div>

<div class="ride-panel">
    <h1 class="panel-heading">Request a ride now</h1>
    <input type="text" class="ride-field" placeholder="Enter pickup location">
    <input type="text" class="ride-field" placeholder="Enter destination">
    <button class="btn-order">Request now</button>
    <button class="btn-defer">Schedule for later</button>
</div>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 50px;
    }

    .register-form {
        background-color: white;
        padding: 20px;
        width: 360px;
        border-radius: 4px;
        margin-bottom: 50px;
    }

    .name-first, .name-last {
        display: inline-block;
        width: 160px;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .email-address {
        display: block;
        width: 338px;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .btn-register {
        background-color: #457dfb;
        color: white;
        border: none;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
    }

    .ride-panel {
        background-color: white;
        padding: 25px;
        width: 400px;
        border-radius: 4px;
    }

    .panel-heading {
        font-size: 30px;
        margin-top: 0;
        margin-bottom: 25px;
    }

    .ride-field {
        display: block;
        width: 100%;
        background-color: #eeeeee;
        border: none;
        padding: 12px;
        margin-bottom: 12px;
        box-sizing: border-box;
    }

    .btn-order {
        background-color: black;
        color: white;
        border: none;
        padding: 12px 20px;
        margin-right: 10px;
        cursor: pointer;
    }

    .btn-defer {
        background-color: #eeeeee;
        color: black;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
    }
</style>
</html>
