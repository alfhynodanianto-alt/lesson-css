<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Links</title>
    <style>
        .btn-uber {
            background-color: #000;
            color: #fff;
            padding: 10px 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-amazon {
            background-color: rgb(255, 216, 30);
            color: #000;
            padding: 10px 40px;
            border: none;
            border-radius: 120px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-github {
            background-color: #2ea44f;
            color: #fff;
            padding: 10px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-boot {
            background-color: #7952b3;
            color: #fff;
            padding: 10px 40px;
            border: none;
            border-radius: 2px;
            cursor: pointer;  
            font-size: 16px;
        }
        .btn-linkedin {
            background-color: #0a66c2;
            color: #fff;
            padding: 10px 40px;
            border: none;
            border-radius: 700px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-boot-outline {
            background-color: #fff;
            color: #8a8888;
            padding: 10px 30px;
            border: 2px solid #6c757d;
            border-radius: 2px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-linkedin-outline {
            background-color: #fff;
            color: #05055b;
            padding: 10px 40px;
            border: 2px solid #8cc9fe;
            border-radius: 700px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2><span style="font-family: 'Times New Roman'; font-size: 24px;">Uber</span></h2>
    <a href="https://www.uber.com"><button class="btn-uber">Request Now</button></a>
    
    <h2><span style="font-family: 'Times New Roman'; font-size: 24px;">Amazon</span></h2>
    <a href="https://www.amazon.com"><button class="btn-amazon">Add to card</button></a>
    
    <h2><span style="font-family: 'Times New Roman'; font-size: 24px;">Github</span></h2>
    <a href="https://www.github.com"><button class="btn-github">Sign up</button></a>
    
    <h2><span style="font-family: 'Times New Roman'; font-size: 24px;">Bootstrap</span></h2>
    <a href="https://www.getbootstrap.com"><button class="btn-boot">Get Started</button></a> <button class="btn-boot-outline">Download</button>
    
    <h2><span style="font-family: 'Times New Roman'; font-size: 24px;">LinkedIn</span></h2>
    <a href="https://www.linkedin.com"><button class="btn-linkedin">Apply on company website</button></a> <button class="btn-linkedin-outline">Save</button>
</body>
</html>
