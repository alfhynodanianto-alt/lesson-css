<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleventh Lesson</title>
    <style>
        .layout-grid-alpha, .layout-grid-beta {
            display: grid;
            font-family: Arial;
            color: black;
            height: 50px;
            align-items: center;
        }

        .layout-grid-alpha {
            grid-template-columns: 200px 75px;
        }

        .layout-grid-beta {
            grid-template-columns: 50px 1fr 75px;
        }

        .column-sky {
            background-color: lightblue;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 5px;
        }

        .column-rose {
            background-color: lightpink;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="layout-grid-alpha">
        <div class="column-sky">200px</div>
        <div class="column-rose">75px</div>
    </div>

    <br><br> 

    <div class="layout-grid-beta">
        <div class="column-sky">col1</div>
        <div class="column-rose">col2</div>
        <div class="column-sky">col3</div>
    </div>

    <br><br>

    <div class="main-container-grid">
        <div>col1</div>
        <div>col2</div>
        <div>col3</div>
        <div>col4</div>

        <div>col1</div>
        <div>col2</div>
        <div>col3</div>
        <div>col4</div>
    </div>

    <style>
        .main-container-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px;
            font-family: Arial;
        }

        .main-container-grid div {
            background-color: lightpink;
            padding: 10px;
            text-align: left;
        }
    </style>

</body>
</html>
