<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seventh Lesson</title>
</head>
<body>
    <h1>7a.</h1>
    <div style="text-align: center;">
        <img src="meong-garong.png" alt="gambar 1" class="img-style-one" width="200">
    </div>
    <style> 
        .img-style-one {
            background: rgb(93, 93, 93);
            border-radius: 20px;
            object-fit: contain;
        }
    </style>
    <hr><br>

    <h1>7b.</h1>
    <div style="text-align: center;">
        <img src="meong-garong.png" alt="gambar 1" class="img-style-two" width="200">
    </div>
    <style> 
        .img-style-two {
            width: 150px;
            height: 150px;
            object-fit: contain;
            background: rgb(93, 93, 93);
            border-radius: 0px;
        }
    </style>
    <hr><br>

    <h1>7c.</h1>
    <div style="text-align: center;">
        <img src="meong-garong.png" alt="gambar 1" class="img-style-three" width="200">
    </div>
    <style> 
        .img-style-three {
            width: 200px;
            height: 200px;
            object-fit: contain;
            background: rgb(93, 93, 93);
            border-radius: 50%;
        }
    </style>
    <hr><br>

    <h1>7d</h1>
    <input type="text" name="Search" id="SearchField" class="input-basic" placeholder="Search">
    <style>
        .input-basic {
            width: 200px;
            height: 40px;
            background: white;
            border: 1px solid rgb(85, 84, 84);
            border-radius: 8px;
        }
    </style>
    <hr>

    <h1>7e</h1>
    <input type="text" name="SearchQuery" placeholder="Search Google or Type a URL" class="input-advanced">
    <style>
        .input-advanced {
            width: 400px;
            height: 40px;
            border: 0px solid white;
            box-shadow: 0 0 3px gray;
            background: white;
            border-radius: 20px;
            padding-left: 15px;
        }
    </style>
    <hr>

    <h1 style="color: red;"><u>Challenge Exercise</u></h1>
    <h1>7f</h1>
    <span style="color: gray; font-family: arial;">Email</span><br>
    <input type="text" class="input-email">
    <style>
        .input-email {
            width: 250px;
            height: 30px;
            border: 1px solid rgb(0, 0, 0);
        }
    </style>
    <br><br>
    <span style="color: gray; font-family: arial;"><small>By Clicking Agree & Join, you agree to the Privacy Policy.</small></span><br><br>

    <style>
        .action-agree {
            width: 250px;
            height: 40px;
            background: rgb(19, 113, 206);
            border: 0px solid white;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
    </style>

    <button class="action-agree">Agree & Join</button><hr>

    <h1>7g</h1>
    <br>
    <img src="meong-garong.png" alt="gambar 1" class="avatar-small">
    <input type="text" placeholder="What's Happening?" class="post-input">
    <button class="action-post">Tweet</button>
    <style> 
        .avatar-small {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: rgb(93, 93, 93);
            border-radius: 50%;
            vertical-align: middle;
        }
        .post-input {
            width: 200px;
            height: 40px;
            background: white;
            color: gray;
            border: none;
            vertical-align: middle;
            outline: none;
        }
        .action-post {
            width: 70px;
            height: 30px;
            background: rgb(20, 125, 237);
            border: 0px solid white;
            border-radius: 15px;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            cursor: pointer;
        }
    </style> 
</body>
</html>
