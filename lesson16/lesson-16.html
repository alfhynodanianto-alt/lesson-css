<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 16</title>

<style>
  body {
    font-family: Arial;
  }

  .video-card {
    width: 300px;
  }


  .wadah-thumbnail {
    position: relative;
  }

  .thumbnail {
    width: 100%;
    cursor: pointer;
  }

  .time {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: black;
    color: white;
    font-size: 12px;
    padding: 2px 5px;
  }


  .video-info {
    display: flex;
    margin-top: 10px;
  }

  
  .channel-container {
    position: relative;
    display: inline-block;
  }

  .channel-pic {
    width: 40px;
    border-radius: 50%;
    cursor: pointer;
  }

  .tooltip {
    position: absolute;
    top: 50px;
    left: 0;
    background: white;
    padding: 10px;
    border-radius: 5px;
    width: 200px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);

    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
  }

  .channel-container:hover .tooltip {
    opacity: 1;
  }

  .isi-tooltip {
    display: flex;
    gap: 10px;
  }

  .tooltip img {
    width: 40px;
    border-radius: 50%;
  }

  .title {
    font-weight: bold;
    cursor: pointer;
  }

  .meta {
    color: gray;
    font-size: 14px;
  }

</style>
</head>
<body>

<div class="video-card">

  <a href="https://youtube.com" target="_blank">
    <div class="wadah-thumbnail">
      <img src="woii🥱😝🤘, lampu kaka.jpg" class="thumbnail">
      <div class="time">14:20</div>
    </div>
  </a>

  <div class="video-info">

    <div class="channel-container">
      <a href="https://youtube.com" target="_blank">
        <img src="Prabowo.jpg" class="channel-pic">
      </a>

      <div class="tooltip">
        <div class="isi-tooltip">
          <img src="Prabowo.jpg">
          <div>
            <div><b>Bocah Gaul</b></div>
            <div class="meta">30M subscribers</div>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-left: 10px;">
      
      <!-- 16b: Title jadi link -->
      <a href="https://youtube.com" target="_blank" class="title">
        woii🥱😝🤘, lampu kaka
      </a>

      <div class="meta">Bocah Gaul</div>
      <div class="meta">1.2M views · 2 months ago</div>

    </div>

  </div>

</div>

</body>
</html>
