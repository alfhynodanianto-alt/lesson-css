<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Third Lesson</title>
    <style>
       .action-request {
           width: 100px;
           height: 40px;
           background-color: #000;
           color: #fff;
           cursor: pointer;
       }
       .action-cart {
           width: 100px;
           height: 40px;
           border-radius: 15px;
           background-color: #ffd814;
           color: #000;
           cursor: pointer;
       }
       .action-register {
           width: 100px;
           height: 30px;
           border-radius: 10px;
           background-color: #446d44;
           color: #fff;
           cursor: pointer;
       }
       .action-launch {
           width: 100px;
           height: 30px;
           background-color: #7952b3;
           color: #fff;
           border-radius: 5px;
           cursor: pointer;
       }
       .action-fetch {
           width: 100px;
           height: 30px;
           border: 1px solid #6c757d;
           color: #6c757d;
           border-radius: 5px;
           cursor: pointer;
       }
       .action-submit {
           width: 200px;
           height: 40px;
           background-color: #0a66c2;
           color: #fff;
           border-radius: 20px;
           cursor: pointer;
       }
       .action-bookmark {
           width: 100px;
           height: 40px;
           border: 1px solid #48a5f7;
           color: #48a5f7;
           border-radius: 20px;
           cursor: pointer;
       }
    </style>
</head>
<body>
    <h3>Uber</h3>
    <button class="action-request">Request now</button>

    <br>
    <h3>Amazon</h3>
    <button class="action-cart">Add to Cart</button>

    <br>
    <h3>GitHub</h3>
    <button class="action-register">Sign up</button>

    <br>
    <h3>Bootstarp</h3>
    <button class="action-launch">Get Started</button> <button class="action-fetch">Download</button>

    <br>
    <h3>Linkedln</h3>
    <button class="action-submit">Apply on company website</button> <button class="action-bookmark">Save</button>
</body>
</html>
